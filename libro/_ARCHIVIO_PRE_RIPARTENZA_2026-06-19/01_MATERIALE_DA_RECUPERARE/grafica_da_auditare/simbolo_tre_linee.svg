<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <filter id="incise">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pietra">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2520;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1e1a16;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#141210;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a7a60;stop-opacity:0.3"/>
      <stop offset="20%" style="stop-color:#c8b890;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#e8d8a8;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#c8b890;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6a5a40;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="shadowLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0806;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#080604;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#080604;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0a0806;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Blocco di pietra scura -->
  <rect width="300" height="400" fill="url(#stoneGrad)" rx="4"/>

  <!-- Texture pietra -->
  <rect width="300" height="400" fill="url(#stoneGrad)" filter="url(#pietra)" opacity="0.4" rx="4"/>

  <!-- Crepe naturali nella pietra (sfondo) -->
  <path d="M 20,80 Q 35,90 28,110 Q 22,130 30,145" stroke="#0d0b09" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 270,200 Q 260,215 265,235 Q 270,255 258,268" stroke="#0d0b09" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 50,320 Q 65,310 70,295" stroke="#0d0b09" stroke-width="0.7" fill="none" opacity="0.3"/>

  <!-- Le tre linee verticali incise nella pietra -->
  <!-- Ombra interna sinistra di ogni linea (effetto incisione) -->
  <rect x="99" y="80" width="2" height="240" fill="url(#shadowLine)" rx="1" opacity="0.9"/>
  <rect x="149" y="80" width="2" height="240" fill="url(#shadowLine)" rx="1" opacity="0.9"/>
  <rect x="199" y="80" width="2" height="240" fill="url(#shadowLine)" rx="1" opacity="0.9"/>

  <!-- Le linee principali -->
  <rect x="101" y="80" width="4" height="240" fill="url(#lineGrad)" rx="1" filter="url(#incise)"/>
  <rect x="148" y="80" width="4" height="240" fill="url(#lineGrad)" rx="1" filter="url(#incise)"/>
  <rect x="195" y="80" width="4" height="240" fill="url(#lineGrad)" rx="1" filter="url(#incise)"/>

  <!-- Bordo destro brillante (effetto scalpello) -->
  <rect x="105" y="82" width="1" height="236" fill="#f0e0c0" opacity="0.15" rx="0.5"/>
  <rect x="152" y="82" width="1" height="236" fill="#f0e0c0" opacity="0.15" rx="0.5"/>
  <rect x="199" y="82" width="1" height="236" fill="#f0e0c0" opacity="0.15" rx="0.5"/>

  <!-- Piccole imperfezioni nelle linee (sembrano incise a mano) -->
  <path d="M 103,148 Q 102,152 103,156" stroke="#2a2218" stroke-width="1.5" fill="none"/>
  <path d="M 150,210 Q 151,214 150,218" stroke="#2a2218" stroke-width="1.5" fill="none"/>
  <path d="M 197,175 Q 196,179 197,183" stroke="#2a2218" stroke-width="1.5" fill="none"/>

  <!-- Bordo esterno della pietra - effetto spessore -->
  <rect width="300" height="400" fill="none" stroke="#3a3028" stroke-width="2" rx="4" opacity="0.6"/>
  <rect x="1" y="1" width="298" height="398" fill="none" stroke="#0a0806" stroke-width="1" rx="3" opacity="0.8"/>

  <!-- Testo sotto -->
  <text x="150" y="365"
    font-family="Georgia, serif"
    font-size="10"
    letter-spacing="5"
    text-anchor="middle"
    fill="#6a5a40"
    opacity="0.7">I DISSONANTI</text>

  <!-- Piccolo marchio in basso a destra - quasi invisibile -->
  <text x="272" y="390"
    font-family="Georgia, serif"
    font-size="8"
    text-anchor="middle"
    fill="#3a2a18"
    opacity="0.4">|||</text>
</svg>
